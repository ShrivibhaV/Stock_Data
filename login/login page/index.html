<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-6">
                <div class="hero-section fade-in">
                    <h1>Welcome to User Auth System</h1>
                    <p>A secure and modern authentication platform</p>

                    <div class="d-flex gap-3 justify-content-center flex-wrap">
                        <a href="login.html" class="btn btn-primary btn-lg">Login</a>
                        <a href="register.html" class="btn btn-outline-light btn-lg">Register</a>
                    </div>

                    <div class="mt-5">
                        <div class="card shadow-lg">
                            <div class="card-body p-4">
                                <h5 class="mb-3">Features</h5>
                                <ul class="list-unstyled text-start">
                                    <li class="mb-2">✓ Secure user registration and authentication</li>
                                    <li class="mb-2">✓ Profile management with editable details</li>
                                    <li class="mb-2">✓ Session management with Redis</li>
                                    <li class="mb-2">✓ Responsive Bootstrap design</li>
                                    <li class="mb-2">✓ MySQL & MongoDB integration</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check if user is already logged in
        $(document).ready(function () {
            const sessionId = localStorage.getItem('session_id');
            if (sessionId) {
                window.location.href = 'profile.html';
            }
        });
    </script>
</body>

</html>
